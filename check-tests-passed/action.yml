name: Check tests passed
description:
  Check whether all checks have passed for a given github ref (usually a dev-tag). Requires Python to be installed.

inputs:
  ref:
    description: The git ref to check, usually a dev version tag
    required: true

  ref-type:
    description: The type of ref (branch/tag/commit)
    required: true

  repository:
    description: The repository to check
    required: false
    default: ${{ github.repository }}

  run_id:
    description: The run ID to check
    required: false
    default: ${{ github.run_id }}

  github-token:
    description: GitHub token for API authentication (avoids rate limits)
    required: false
    default: ${{ github.token }}

  skip-test-checks:
    description: Skip the test checks
    required: false
    default: 'false'

  setup-python:
    description: Whether to setup python using actions/setup-python
    required: false
    default: 'false'

runs:
  using: composite

  steps:
    - if: ${{ inputs.setup-python == 'true' }}
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Install dependencies
      shell: bash
      run: |
        pip install -q httpx

    - if: ${{ inputs.skip-test-checks == 'false' }}
      shell: bash
      name: Get commit status
      env:
        INPUT_REF_TYPE: ${{ inputs.ref-type }}
        INPUT_REF: ${{ inputs.ref }}
        INPUT_REPOSITORY: ${{ inputs.repository }}
        INPUT_RUN_ID: ${{ inputs.run_id }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        python3 "${{ github.action_path }}/check_tests.py"
