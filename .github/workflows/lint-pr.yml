# Reusable PR gate: semantic PR title + changelog fragment check.
# Consolidates the identical lint-pr.yml previously copied across repos.
#
# Usage (complete caller file, .github/workflows/lint-pr.yml in each repo):
#
#   name: "Lint PR"
#   on:
#     pull_request:
#       types: [opened, reopened, edited, synchronize, labeled, unlabeled]
#   concurrency:
#     group: ${{ github.workflow }}-${{ github.ref }}
#     cancel-in-progress: true
#   jobs:
#     lint:
#       uses: supertokens/actions/.github/workflows/lint-pr.yml@main
#
name: "Lint PR (reusable)"

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  lint-pr-title:
    name: Lint PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          validateSingleCommit: true

  lint-changelog:
    name: Require Changelog Fragment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changelog fragment
        if: "!contains(github.event.pull_request.labels.*.name, 'Skip-Changelog')"
        run: |
          git fetch origin ${{ github.base_ref }}

          new_fragments=$(git diff --name-only --diff-filter=A \
            "origin/${{ github.base_ref }}...HEAD" -- .changes/unreleased/)

          if [[ -z "$new_fragments" ]]; then
            echo "::error::No changelog fragment found in .changes/unreleased/"
            echo ""
            echo "Please add a fragment before merging:"
            echo "  changie new"
            echo ""
            echo "Or add the 'Skip-Changelog' label to skip this check."
            exit 1
          fi

          echo "Found changelog fragment(s):"
          echo "$new_fragments"
