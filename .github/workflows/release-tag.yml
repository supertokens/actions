# Reusable release-tag pipeline: tag + publish an SDK release from a version branch.
#
# Consolidates the pipeline-release-tag.yml previously copied (with drift) across
# supertokens-node / -python / -golang. Ported line-for-line from the golang
# pipeline (the cleanest copy), parameterized by sdk_name. Two DELIBERATE changes
# from all current copies — everything else should diff clean against golang:
#
#   1. register-version is universal. Node's current pipeline lacks this job and
#      silently depends on a legacy CircleCI dev-tag script performing the same
#      PUT. The backend contract makes PUT the only creator of the version row
#      and the only recorder of FDI/CDI compatibility arrays — the later PATCH
#      calls 404 without it.
#   2. The git tag is pushed BEFORE the API "release: true" PATCH — see the
#      comment on the release job.
#
# Caller contract (.github/workflows/pipeline-release-tag.yml in each SDK repo):
#   - triggers: pull_request [closed] on version branches ('[0-9]+.[0-9]+')
#     + workflow_dispatch (branch / skip-test-checks / skip-other-version-checks)
#   - permissions: contents: write, pull-requests: read
#   - calls this workflow with `secrets: inherit`
#   - ecosystem jobs (npm publish, PyPI/twine, docs builds) stay in the CALLER
#     and consume this workflow's outputs via `needs:` (locked decision — this
#     file carries only the shared five-job skeleton).
#
# Version-hook contract: the caller repo must provide
# ./hooks/populate-hook-constants.sh which, when sourced, exports:
#     constantsVersion    e.g. 0.26.0  — the version being released
#     constantsVersionXy  e.g. 0.26    — its major.minor prefix
# golang and python comply today. node's script emits packageVersion /
# packageLockVersion; node's adoption (C3) adds a compliance shim to its hook
# script. Repo-specific extra checks (e.g. node's package-lock mismatch check)
# also belong in the hook script, which exits non-zero to fail setup.
#
# Environments & tokens:
#   - `environment: publish` on the release job resolves in the CALLER repo, so
#     each repo's own protection rules / required reviewers gate its releases.
#   - Jobs that push or run `gh` (setup's checkout, release, merge) mint a
#     GitHub App installation token (same pattern as dev-sync.yml). Requires
#     the RELEASE_APP_ID variable and RELEASE_APP_PRIVATE_KEY secret to be
#     visible to the caller repo. register-version / mark-as-success only talk
#     to api.supertokens.io — no GitHub token needed.

name: "Release Pipeline (reusable)"

on:
  workflow_call:
    inputs:
      sdk_name:
        description: 'SDK name as registered in the supertokens API ("name" field): node | python | golang'
        type: string
        required: true
      branch:
        description: "Release branch (workflow_dispatch passthrough). Empty = derive from the merged release PR's base."
        type: string
        default: ""
      skip-test-checks:
        description: Skip tests passed checks
        type: boolean
        default: false
      skip-other-version-checks:
        description: Skip server checks for core and frontend versions
        type: boolean
        default: false
      changelog_add_paths:
        description: "Paths staged for the changelog commit — include the repo's changie replacement targets (version files)"
        type: string
        default: ".changes/ CHANGELOG.md"

    outputs:
      version:
        description: The released version, e.g. 0.26.0
        value: ${{ jobs.setup.outputs.constantsVersion }}
      versionXy:
        description: The released major.minor, e.g. 0.26
        value: ${{ jobs.setup.outputs.constantsVersionXy }}
      releaseTag:
        description: The release tag, e.g. v0.26.0
        value: ${{ jobs.setup.outputs.releaseTag }}
      branch:
        description: The version branch released from, e.g. 0.26
        value: ${{ jobs.setup.outputs.branch }}
      isLatest:
        description: "'true' if this version is the newest released version of this SDK (from the merge job)"
        value: ${{ jobs.merge.outputs.isLatest }}

    secrets:
      RELEASE_APP_PRIVATE_KEY:
        required: true
      SUPERTOKENS_API_KEY:
        required: true

jobs:
  setup:
    # The github context here is the CALLER's triggering event, so this gate
    # works unchanged from the per-repo pipelines: run on manual dispatch, or
    # when a dev-sync release PR (release/vX.Y.Z) was merged into its version
    # branch. A closed-unmerged PR skips everything.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'release/v'))
    runs-on: ubuntu-latest

    outputs:
      branch: ${{ steps.params.outputs.branch }}
      constantsVersion: ${{ steps.versions.outputs.constantsVersion }}
      constantsVersionXy: ${{ steps.versions.outputs.constantsVersionXy }}
      releaseTag: ${{ steps.versions.outputs.releaseTag }}

    steps:
      - name: Determine release branch
        id: params
        run: |
          if [[ "${{ inputs.branch }}" != "" ]]; then
            echo "branch=${{ inputs.branch }}" >> $GITHUB_OUTPUT
          else
            echo "branch=${{ github.event.pull_request.base.ref }}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: supertokens
          repositories: ${{ github.event.repository.name }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.params.outputs.branch }}
          # Need a complete fetch to make the master merge check work
          fetch-depth: 0
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Populate variables
        id: versions
        run: |
          # Version-hook contract (see header): must export
          # constantsVersion / constantsVersionXy.
          . ./hooks/populate-hook-constants.sh

          echo "constantsVersion=$constantsVersion" | tee -a "$GITHUB_OUTPUT" "$GITHUB_ENV"
          echo "constantsVersionXy=$constantsVersionXy" | tee -a "$GITHUB_OUTPUT" "$GITHUB_ENV"
          echo "releaseTag=v$constantsVersion" | tee -a "$GITHUB_OUTPUT" "$GITHUB_ENV"

      - name: Setup git
        run: |
          # NOTE: The user email is {user.id}+{user.login}@users.noreply.github.com.
          # See users API: https://api.github.com/users/github-actions%5Bbot%5D
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin master

      - name: Check if branch needs master merge
        run: |
          if [[ $(git log origin/master ^HEAD) != "" ]]; then
            echo "You need to merge master into this branch."
            exit 1
          fi

      - name: Check tag and branch correctness
        run: |
          if [[ "${{ steps.versions.outputs.constantsVersion }}" != ${{ steps.params.outputs.branch }}* ]]
          then
            echo "Adding tag to wrong branch"
            exit 1
          fi

          if git rev-parse ${{ steps.versions.outputs.releaseTag }} >/dev/null 2>&1
          then
              echo "The released version of this tag already exists."
              exit 1
          fi

  register-version:
    # Registers this version in the supertokens API (testPassed defaults false).
    # PUT is the ONLY call that creates the version row and the ONLY call that
    # records the FDI/CDI compatibility arrays — the PATCHes in mark-as-success
    # and release 404 with "Driver not found" if this hasn't run. This job is
    # unconditional for all SDKs: node's old pipeline omitted it and depended
    # on a legacy CircleCI dev-tag script instead (incomplete migration).
    runs-on: ubuntu-latest
    needs:
      - setup

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch }}

      - name: Register version with supertokens API
        run: |
          fdiVersions=$(jq -c '.versions' frontendDriverInterfaceSupported.json)
          cdiVersions=$(jq -c '.versions' coreDriverInterfaceSupported.json)

          curl --fail-with-body -X PUT \
            https://api.supertokens.io/0/driver \
            -H 'Content-Type: application/json' \
            -H 'api-version: 0' \
            -d "{
              \"password\": \"${{ secrets.SUPERTOKENS_API_KEY }}\",
              \"version\": \"${{ needs.setup.outputs.constantsVersion }}\",
              \"name\": \"${{ inputs.sdk_name }}\",
              \"frontendDriverInterfaces\": $fdiVersions,
              \"coreDriverInterfaces\": $cdiVersions
            }"

  mark-as-success:
    runs-on: ubuntu-latest
    needs:
      - setup
      - register-version

    steps:
      - name: Check tests passed on branch
        uses: supertokens/actions/check-tests-passed@main
        with:
          ref: ${{ needs.setup.outputs.branch }}
          ref-type: branch
          repository: ${{ github.repository }}
          run_id: ${{ github.run_id }}
          # Always set up python: the action's check script needs it, and only
          # some callers' runners are guaranteed to have the right version.
          setup-python: true
          skip-test-checks: ${{ inputs.skip-test-checks }}

      - name: Mark tests as passed in supertokens API
        run: |
          curl --fail-with-body -X PATCH \
              https://api.supertokens.io/0/driver \
              -H 'Content-Type: application/json' \
              -H 'api-version: 0' \
              -d "{
                \"password\": \"${{ secrets.SUPERTOKENS_API_KEY }}\",
                \"version\":\"${{ needs.setup.outputs.constantsVersion }}\",
                \"name\": \"${{ inputs.sdk_name }}\",
                \"testPassed\": true
              }"

  release:
    runs-on: ubuntu-latest

    # This job marks the version as a release version and creates tags.
    # Binding this to the publish env to require approvals before run — the
    # environment resolves in the CALLER repo, so each repo's protection rules
    # apply. Further jobs are follow-ups to the release and are not required
    # to be approved once release is approved.
    #
    # NO RECOVERY PATHS, BY DESIGN: there is deliberately no re-run / retag
    # affordance past the point the tag is pushed. Server-side, a released
    # version is immutable; Go-proxy-side, a fetched tag is cached forever.
    # If anything fails after the tag exists, the fix is a NEW PATCH VERSION
    # through the normal pipeline — never deleting or moving a tag.
    #
    # Step order is deliberate (a change vs. the old per-repo pipelines, which
    # PATCHed release:true before tagging): the tag IS the release (for Go,
    # literally — the proxy serves from tags), so the API mark must follow
    # reality, not precede it. Order: changelog commit -> tag -> API PATCH ->
    # GitHub release. A failure between tag and PATCH leaves the API unaware
    # of a pushed tag — recoverable state, resolved by the next patch version
    # (or a manual PATCH by an admin); the old order could instead advertise
    # a release whose tag never got pushed.
    environment: publish
    needs:
      - setup
      - mark-as-success

    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: supertokens
          repositories: ${{ github.event.repository.name }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch }}
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup git
        run: |
          # NOTE: The user email is {user.id}+{user.login}@users.noreply.github.com.
          # See users API: https://api.github.com/users/github-actions%5Bbot%5D
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check tests passed
        run: |
          testsPassed=$(curl -s -X GET "https://api.supertokens.io/0/driver?password=${{ secrets.SUPERTOKENS_API_KEY }}&version=${{ needs.setup.outputs.constantsVersion }}&name=${{ inputs.sdk_name }}" -H 'api-version: 0')

          if [[ $(echo $testsPassed | jq .testPassed) != "true" ]]
          then
            echo "All tests have not passed. Exiting."
            exit 1
          fi

      - if: inputs.skip-other-version-checks != true
        name: Check if core and frontend released
        run: |
          canReleaseSafelyResponse=$(curl -s -X GET "https://api.supertokens.io/0/driver/release/check?password=${{ secrets.SUPERTOKENS_API_KEY }}&version=${{ needs.setup.outputs.constantsVersion }}&name=${{ inputs.sdk_name }}" -H 'api-version: 0')

          if [[ $(echo $canReleaseSafelyResponse | jq .canRelease) != "true" ]]
          then
            echo "Cannot release. Have you released corresponding core and frontend?"
            exit 1
          fi

      - uses: miniscruff/changie-action@v2
        with:
          version: latest

      - name: Update changelog for release
        run: |
          version_file=".changes/${{ needs.setup.outputs.releaseTag }}.md"

          if [[ -f "$version_file" ]]; then
            # Normal path: dev-sync already batched fragments and bumped the
            # version. Just regenerate CHANGELOG.md to ensure it's in sync.
            changie merge
          else
            # Safety net: direct/hotfix release that bypassed the dev-sync PR.
            # Batch fragments now and apply version replacements.
            changie batch ${{ needs.setup.outputs.releaseTag }}
            changie merge
          fi

          git add ${{ inputs.changelog_add_paths }}
          git diff --staged --quiet || git commit -m "chore: update changelog for ${{ needs.setup.outputs.releaseTag }}"
          git push origin ${{ needs.setup.outputs.branch }}

      - name: Create release tag
        run: |
          git tag ${{ needs.setup.outputs.releaseTag }}
          git push --tags

      - name: Mark for release
        run: |
          curl --fail-with-body -X PATCH \
              https://api.supertokens.io/0/driver \
              -H 'Content-Type: application/json' \
              -H 'api-version: 0' \
              -d "{
                  \"password\": \"${{ secrets.SUPERTOKENS_RELEASE_API_KEY }}\",
                  \"name\":\"${{ inputs.sdk_name }}\",
                  \"version\":\"${{ needs.setup.outputs.constantsVersion }}\",
                  \"release\": true
              }"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Strip the version header line and leading blank lines for the body.
          # Title uses the repo name (e.g. "supertokens-golang 0.26.0") instead
          # of the old per-repo prose titles ("Go SDK ...") to avoid another
          # input for a cosmetic string.
          notes=$(sed '1d' .changes/${{ needs.setup.outputs.releaseTag }}.md | sed '/./,$!d')
          gh release create "${{ needs.setup.outputs.releaseTag }}" \
            --title "${{ github.event.repository.name }} ${{ needs.setup.outputs.constantsVersion }}" \
            --notes "$notes"

  merge:
    runs-on: ubuntu-latest
    needs:
      - setup
      - release

    outputs:
      isLatest: ${{ steps.merge-check.outputs.isLatest }}

    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: supertokens
          repositories: ${{ github.event.repository.name }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.branch }}
          # Need a complete fetch to make the master merge work
          fetch-depth: 0
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup git
        run: |
          # NOTE: The user email is {user.id}+{user.login}@users.noreply.github.com.
          # See users API: https://api.github.com/users/github-actions%5Bbot%5D
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check API and merge to master
        id: merge-check
        run: |
          response=$(curl -s -X GET "https://api.supertokens.io/0/driver/latest/check?password=${{ secrets.SUPERTOKENS_API_KEY }}&version=${{ needs.setup.outputs.constantsVersion }}&name=${{ inputs.sdk_name }}" -H 'api-version: 0')
          isLatest=$(echo $response | jq .isLatest)

          echo "isLatest=$isLatest" | tee -a "$GITHUB_OUTPUT" "$GITHUB_ENV"

          if [[ $isLatest == "true" ]]
          then
            git checkout master
            git checkout ${{ needs.setup.outputs.branch }}

            git merge master
            git checkout master
            git merge ${{ needs.setup.outputs.branch }}
            git push
            git checkout ${{ needs.setup.outputs.branch }}
          fi

      - name: Sync dev with release
        # Keep dev in sync after release so that:
        #   - batched fragments are removed from dev's unreleased/
        #   - dev's version files reflect the released version
        #   - the next dev-sync PR computes the correct next version
        # This step existed in golang/python but was MISSING in node — its
        # absence is what let node's dev drift (the v24.0.2-class incidents).
        # Living here, no repo can lose it again.
        #
        # Only runs for the latest version — older branch patches don't touch dev.
        if: steps.merge-check.outputs.isLatest == 'true'
        run: |
          git fetch origin dev
          git checkout dev
          git merge ${{ needs.setup.outputs.branch }} --no-ff \
            -m "chore: sync dev after ${{ needs.setup.outputs.releaseTag }}"
          git push origin dev
          git checkout ${{ needs.setup.outputs.branch }}
